<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JATI — Jala Transformasi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --black: #0f0f0f;
      --white: #fafafa;
      --gray: #6b6b6b;
      --light: #e8e8e8;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--white);
      color: var(--black);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 2.5rem 3rem;
      border-bottom: 1px solid var(--light);
    }

    .logo {
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--black);
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4rem 3rem;
    }

    .hero {
      max-width: 520px;
      text-align: center;
    }

    .hero h1 {
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 300;
      line-height: 1.2;
      letter-spacing: -0.02em;
      margin-bottom: 1.5rem;
      color: var(--black);
    }

    .hero p {
      font-size: 1rem;
      font-weight: 400;
      line-height: 1.7;
      color: var(--gray);
      margin-bottom: 2.5rem;
    }

    .divider {
      width: 2rem;
      height: 1px;
      background: var(--black);
      margin: 0 auto 2.5rem;
    }

    .contact {
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--gray);
      text-decoration: none;
      border-bottom: 1px solid var(--light);
      padding-bottom: 2px;
      transition: color 0.2s, border-color 0.2s;
    }

    .contact:hover {
      color: var(--black);
      border-color: var(--black);
    }

    footer {
      padding: 2rem 3rem;
      border-top: 1px solid var(--light);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    footer span {
      font-size: 0.75rem;
      color: var(--gray);
      letter-spacing: 0.05em;
    }

    @media (max-width: 600px) {
      header, footer { padding: 1.5rem; }
      main { padding: 3rem 1.5rem; }
      footer { flex-direction: column; gap: 0.5rem; text-align: center; }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">JATI</div>
  </header>

  <main>
    <div class="hero">
      <h1>Jala Transformasi</h1>
      <div class="divider"></div>
      <p>
        Sumber daya kepemimpinan lintas budaya untuk mereka yang dipanggil
        untuk melayani di luar batas budaya dan bangsa.
      </p>
      <a href="mailto:chris@crispydevelopment.com" class="contact">Hubungi Kami</a>
    </div>
  </main>

  <footer>
    <span>jala-transformasi.net</span>
    <span>&copy; 2026 JATI</span>
  </footer>

</body>
</html>
